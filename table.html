<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Table</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="yearTitle"></h1>
<button onclick="window.location.href='index.html'">⬅ Back to Menu</button>

<div class="table-data">
  <table>
    <thead>
      <tr>
        <th>Student ID</th>
        <th>Name</th>
        <th>Sex</th>
        <th>Birthday</th>
        <th>Appointment</th>
        <th>Age</th>
        <th>Height (cm)</th>
        <th>Weight (kg)</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="table_body"></tbody>
  </table>
</div>

<script src="table.js"></script>
</body>
</html>
